services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: edumind
      POSTGRES_PASSWORD: edumind_secret
      POSTGRES_DB: edumind
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edumind"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../../backend
      dockerfile: ../infra/docker/backend.Dockerfile
    ports:
      - "8000:8000"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: edumind
      POSTGRES_PASSWORD: edumind_secret
      POSTGRES_DB: edumind
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../../backend:/app
      - uploads:/app/uploads

  celery-worker:
    build:
      context: ../../backend
      dockerfile: ../infra/docker/backend.Dockerfile
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: edumind
      POSTGRES_PASSWORD: edumind_secret
      POSTGRES_DB: edumind
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../../backend:/app
      - uploads:/app/uploads

volumes:
  pgdata:
  uploads:
